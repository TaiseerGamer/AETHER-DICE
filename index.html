<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AETHER DICE v0.0.1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="max-w-6xl mx-auto p-4">
    <!-- HEADER -->
    <div class="flex justify-between items-center mb-8 border-b border-purple-500 pb-4">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-gradient-to-br from-purple-500 to-pink-500 rounded-xl flex items-center justify-center text-3xl shadow-lg shadow-purple-500/50">🎲</div>
        <div>
          <h1 class="text-4xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-400">AETHER DICE</h1>
          <p class="text-xs text-purple-400">v0.0.1 • ROLL • COLLECT • ASCEND</p>
        </div>
      </div>
      
      <div class="flex items-center gap-8">
        <div onclick="switchTab(0)" class="tab-btn active cursor-pointer px-6 py-2 bg-zinc-900 hover:bg-zinc-800 rounded-xl flex items-center gap-2 text-sm">
          <i class="fa-solid fa-dice"></i> ROLL
        </div>
        <div onclick="switchTab(1)" class="tab-btn cursor-pointer px-6 py-2 bg-zinc-900 hover:bg-zinc-800 rounded-xl flex items-center gap-2 text-sm">
          <i class="fa-solid fa-shop"></i> SHOP
        </div>
        <div onclick="switchTab(2)" class="tab-btn cursor-pointer px-6 py-2 bg-zinc-900 hover:bg-zinc-800 rounded-xl flex items-center gap-2 text-sm">
          <i class="fa-solid fa-list"></i> HISTORY
        </div>
        
        <div class="bg-zinc-900 px-6 py-3 rounded-2xl flex items-center gap-3 border border-yellow-400">
          <i class="fa-solid fa-coins text-yellow-400"></i>
          <span id="coin-display" class="font-mono text-2xl font-bold text-yellow-400">0</span>
        </div>
      </div>
    </div>

    <!-- ROLL TAB -->
    <div id="tab-0" class="tab-content">
      <div class="flex flex-col lg:flex-row gap-8">
        <div class="flex-1 flex flex-col items-center justify-center py-12">
          <div id="dice" onclick="rollDice()" 
               class="dice w-64 h-64 bg-gradient-to-br from-zinc-700 to-zinc-900 rounded-3xl flex items-center justify-center text-8xl shadow-2xl shadow-purple-600/50 cursor-pointer border-8 border-purple-400 hover:border-pink-400">
            🎲
          </div>
          
          <div class="mt-8 text-center">
            <button onclick="rollDice()" 
                    class="px-12 py-6 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-2xl font-bold rounded-2xl shadow-xl active:scale-95 transition-all">
              ROLL THE AETHER
            </button>
          </div>
          
          <div id="result" class="mt-10 min-h-[200px] w-full max-w-md text-center result hidden"></div>
        </div>

        <div class="w-full lg:w-96 bg-zinc-900/70 border border-purple-500/30 rounded-3xl p-6">
          <h2 class="text-xl mb-4 flex items-center gap-2"><i class="fa-solid fa-chart-simple"></i> STATS</h2>
          <div class="space-y-4">
            <div class="flex justify-between bg-zinc-800 p-4 rounded-2xl">
              <div class="text-zinc-400">Total Rolls</div>
              <div id="total-rolls" class="font-mono">0</div>
            </div>
            <div class="flex justify-between bg-zinc-800 p-4 rounded-2xl">
              <div class="text-zinc-400">Best Pull</div>
              <div id="best-pull" class="text-yellow-400 font-bold">0</div>
            </div>
            <div class="flex justify-between bg-zinc-800 p-4 rounded-2xl">
              <div class="text-zinc-400">Current Multiplier</div>
              <div id="multiplier-display" class="font-mono text-purple-400">1.0x</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- SHOP TAB -->
    <div id="tab-1" class="tab-content hidden">
      <h2 class="text-3xl font-bold mb-8 text-center">AETHER SHOP</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="shop-items"></div>
    </div>

    <!-- HISTORY TAB -->
    <div id="tab-2" class="tab-content hidden">
      <h2 class="text-3xl font-bold mb-6">ROLL HISTORY</h2>
      <div id="history-list" class="space-y-3 max-h-[70vh] overflow-auto"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
